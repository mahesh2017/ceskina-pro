include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated/**"

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    prefer_single_quotes: true
    sort_child_properties_last: true
    use_key_in_widget_constructors: true
    avoid_print: true
    require_trailing_commas: true
    # New in flutter_lints 6 — purely stylistic. Not adopted yet: the
    # null-aware-element rewrite would touch pattern-binding collection-ifs in
    # security-sensitive diagnostics code, and `__` placeholders are
    # intentional in some callbacks. Revisit as a dedicated cleanup.
    use_null_aware_elements: false
    unnecessary_underscores: false