<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BDC3C7"/>
    </marker>
  </defs>

  <rect width="800" height="720" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#2C3E50">Adjective–Noun Agreement</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#7F8C8D" font-style="italic">Shoda přídavného jména — one adjective, three endings by gender</text>

  <!-- Root adjective hub -->
  <g transform="translate(280, 130)">
    <rect width="240" height="100" rx="14" fill="#2C3E50"/>
    <text x="120" y="30" text-anchor="middle" font-size="11" fill="#BDC3C7" letter-spacing="1.5">STEM (unchanged)</text>
    <text x="120" y="65" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">mlad</text>
    <text x="120" y="88" text-anchor="middle" font-size="11" fill="#BDC3C7" font-style="italic">"young"</text>
  </g>

  <!-- Three diverging connectors from hub bottom (y=230) to three gender cards (y=270) -->
  <g fill="none" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowGray)">
    <line x1="350" y1="230" x2="150" y2="270"/>
    <line x1="400" y1="230" x2="400" y2="270"/>
    <line x1="450" y1="230" x2="650" y2="270"/>
  </g>

  <!-- Gender card 1: Masculine - blue, -ý -->
  <g transform="translate(40, 270)">
    <rect width="220" height="170" rx="14" fill="#4A90D9"/>

    <text x="14" y="26" font-size="11" font-weight="700" fill="#fff" opacity="0.85" letter-spacing="1.5">MASCULINE</text>
    <text x="14" y="48" font-size="14" fill="#fff" opacity="0.95">rod mužský</text>

    <!-- Ending badge -->
    <rect x="14" y="62" width="192" height="48" rx="8" fill="#fff" opacity="0.18"/>
    <text x="110" y="96" text-anchor="middle" font-size="32" font-weight="700" fill="#fff">+ <tspan fill="#FFD700">-ý</tspan></text>

    <line x1="14" y1="120" x2="206" y2="120" stroke="#fff" stroke-width="1" opacity="0.3"/>

    <!-- Example -->
    <text x="110" y="145" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">mlad<tspan fill="#FFD700">ý</tspan> muž</text>
    <text x="110" y="162" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8" font-style="italic">"the young man"</text>
  </g>

  <!-- Gender card 2: Feminine - pink, -á -->
  <g transform="translate(290, 270)">
    <rect width="220" height="170" rx="14" fill="#E91E8C"/>

    <text x="14" y="26" font-size="11" font-weight="700" fill="#fff" opacity="0.85" letter-spacing="1.5">FEMININE</text>
    <text x="14" y="48" font-size="14" fill="#fff" opacity="0.95">rod ženský</text>

    <rect x="14" y="62" width="192" height="48" rx="8" fill="#fff" opacity="0.18"/>
    <text x="110" y="96" text-anchor="middle" font-size="32" font-weight="700" fill="#fff">+ <tspan fill="#FFD700">-á</tspan></text>

    <line x1="14" y1="120" x2="206" y2="120" stroke="#fff" stroke-width="1" opacity="0.3"/>

    <text x="110" y="145" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">mlad<tspan fill="#FFD700">á</tspan> žena</text>
    <text x="110" y="162" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8" font-style="italic">"the young woman"</text>
  </g>

  <!-- Gender card 3: Neuter - orange, -é -->
  <g transform="translate(540, 270)">
    <rect width="220" height="170" rx="14" fill="#E67E22"/>

    <text x="14" y="26" font-size="11" font-weight="700" fill="#fff" opacity="0.85" letter-spacing="1.5">NEUTER</text>
    <text x="14" y="48" font-size="14" fill="#fff" opacity="0.95">rod střední</text>

    <rect x="14" y="62" width="192" height="48" rx="8" fill="#fff" opacity="0.18"/>
    <text x="110" y="96" text-anchor="middle" font-size="32" font-weight="700" fill="#fff">+ <tspan fill="#FFD700">-é</tspan></text>

    <line x1="14" y1="120" x2="206" y2="120" stroke="#fff" stroke-width="1" opacity="0.3"/>

    <text x="110" y="145" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">mlad<tspan fill="#FFD700">é</tspan> dítě</text>
    <text x="110" y="162" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8" font-style="italic">"the young child"</text>
  </g>

  <!-- Comparison table -->
  <g transform="translate(40, 470)">
    <rect width="720" height="180" rx="12" fill="#F4F6F7"/>

    <text x="20" y="28" font-size="13" font-weight="700" fill="#2C3E50" letter-spacing="1.5">HARD ADJECTIVE ENDINGS — SINGULAR NOMINATIVE</text>

    <!-- Column headers -->
    <g font-size="11" font-weight="700" fill="#7F8C8D" letter-spacing="0.5">
      <text x="20" y="56">GENDER</text>
      <text x="220" y="56">ENDING</text>
      <text x="350" y="56">EXAMPLE</text>
      <text x="560" y="56">NOUN GENDER</text>
    </g>

    <line x1="20" y1="64" x2="700" y2="64" stroke="#BDC3C7" stroke-width="1"/>

    <!-- Masc row -->
    <g transform="translate(0, 80)">
      <rect x="20" y="0" width="10" height="22" fill="#4A90D9"/>
      <text x="40" y="17" font-size="13" font-weight="700" fill="#2C3E50">masculine</text>
      <text x="220" y="17" font-size="18" font-weight="700" fill="#4A90D9">-ý</text>
      <text x="350" y="17" font-size="15" fill="#2C3E50">mlad<tspan font-weight="700" fill="#4A90D9">ý</tspan> muž</text>
      <text x="560" y="17" font-size="11" fill="#7F8C8D" font-style="italic">consonant stem</text>
    </g>

    <!-- Fem row -->
    <g transform="translate(0, 110)">
      <rect x="20" y="0" width="10" height="22" fill="#E91E8C"/>
      <text x="40" y="17" font-size="13" font-weight="700" fill="#2C3E50">feminine</text>
      <text x="220" y="17" font-size="18" font-weight="700" fill="#E91E8C">-á</text>
      <text x="350" y="17" font-size="15" fill="#2C3E50">mlad<tspan font-weight="700" fill="#E91E8C">á</tspan> žena</text>
      <text x="560" y="17" font-size="11" fill="#7F8C8D" font-style="italic">-a stem</text>
    </g>

    <!-- Neut row -->
    <g transform="translate(0, 140)">
      <rect x="20" y="0" width="10" height="22" fill="#E67E22"/>
      <text x="40" y="17" font-size="13" font-weight="700" fill="#2C3E50">neuter</text>
      <text x="220" y="17" font-size="18" font-weight="700" fill="#E67E22">-é</text>
      <text x="350" y="17" font-size="15" fill="#2C3E50">mlad<tspan font-weight="700" fill="#E67E22">é</tspan> dítě</text>
      <text x="560" y="17" font-size="11" fill="#7F8C8D" font-style="italic">-o / -e stem</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="400" y="700" text-anchor="middle" font-size="11" fill="#95A5A6">"Hard" endings shown here · "soft" adjectives use -í for all genders (moderní muž/žena/auto).</text>
</svg>