<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="620" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#2C3E50">Czech Conditional Mood</text>
  <text x="400" y="64" text-anchor="middle" font-size="14" fill="#7F8C8D">Kondicionál — formation with the conditional auxiliary + L-participle</text>
  <line x1="120" y1="78" x2="680" y2="78" stroke="#ECF0F1" stroke-width="2"/>

  <!-- Formula banner -->
  <rect x="80" y="92" width="640" height="46" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="400" y="120" text-anchor="middle" font-size="16" fill="#2C3E50">
    <tspan font-weight="700" fill="#8E44AD">Formula:</tspan>
    <tspan>  conditional auxiliary (by-) + L-participle</tspan>
  </text>

  <!-- Auxiliary table -->
  <text x="80" y="170" font-size="14" font-weight="700" fill="#7F8C8D">CONDITIONAL AUXILIARIES</text>
  <g font-size="14">
    <!-- header row -->
    <rect x="80" y="180" width="160" height="36" fill="#8E44AD"/>
    <text x="160" y="203" text-anchor="middle" fill="#FFFFFF" font-weight="700">Person</text>
    <rect x="240" y="180" width="160" height="36" fill="#8E44AD"/>
    <text x="320" y="203" text-anchor="middle" fill="#FFFFFF" font-weight="700">Singular</text>
    <rect x="400" y="180" width="160" height="36" fill="#8E44AD"/>
    <text x="480" y="203" text-anchor="middle" fill="#FFFFFF" font-weight="700">Plural</text>

    <!-- 1st -->
    <rect x="80" y="216" width="160" height="34" fill="#F8F4FB" stroke="#E8DAEF" stroke-width="1"/>
    <text x="160" y="238" text-anchor="middle" fill="#2C3E50">1st person</text>
    <rect x="240" y="216" width="160" height="34" fill="#FFFFFF" stroke="#E8DAEF" stroke-width="1"/>
    <text x="320" y="238" text-anchor="middle" fill="#8E44AD" font-weight="700">bych</text>
    <rect x="400" y="216" width="160" height="34" fill="#FFFFFF" stroke="#E8DAEF" stroke-width="1"/>
    <text x="480" y="238" text-anchor="middle" fill="#8E44AD" font-weight="700">bychom</text>

    <!-- 2nd -->
    <rect x="80" y="250" width="160" height="34" fill="#F8F4FB" stroke="#E8DAEF" stroke-width="1"/>
    <text x="160" y="272" text-anchor="middle" fill="#2C3E50">2nd person</text>
    <rect x="240" y="250" width="160" height="34" fill="#FFFFFF" stroke="#E8DAEF" stroke-width="1"/>
    <text x="320" y="272" text-anchor="middle" fill="#8E44AD" font-weight="700">bys</text>
    <rect x="400" y="250" width="160" height="34" fill="#FFFFFF" stroke="#E8DAEF" stroke-width="1"/>
    <text x="480" y="272" text-anchor="middle" fill="#8E44AD" font-weight="700">byste</text>

    <!-- 3rd -->
    <rect x="80" y="284" width="160" height="34" fill="#F8F4FB" stroke="#E8DAEF" stroke-width="1"/>
    <text x="160" y="306" text-anchor="middle" fill="#2C3E50">3rd person</text>
    <rect x="240" y="284" width="160" height="34" fill="#FFFFFF" stroke="#E8DAEF" stroke-width="1"/>
    <text x="320" y="306" text-anchor="middle" fill="#8E44AD" font-weight="700">by</text>
    <rect x="400" y="284" width="160" height="34" fill="#FFFFFF" stroke="#E8DAEF" stroke-width="1"/>
    <text x="480" y="306" text-anchor="middle" fill="#8E44AD" font-weight="700">by</text>
  </g>

  <!-- L-participle note -->
  <rect x="580" y="180" width="140" height="138" rx="6" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5"/>
  <text x="650" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#E67E22">L-participle</text>
  <text x="650" y="226" text-anchor="middle" font-size="11" fill="#B9772E">mál — měl</text>
  <text x="650" y="244" text-anchor="middle" font-size="11" fill="#B9772E">šel — šla</text>
  <text x="650" y="262" text-anchor="middle" font-size="11" fill="#B9772E">dělal — dělala</text>
  <text x="650" y="290" text-anchor="middle" font-size="10" fill="#7F8C8D" font-style="italic">past tense form,</text>
  <text x="650" y="304" text-anchor="middle" font-size="10" fill="#7F8C8D" font-style="italic">gendered ending</text>

  <!-- Example breakdown -->
  <text x="80" y="360" font-size="14" font-weight="700" fill="#7F8C8D">EXAMPLE — "If I had time, I would go to the cinema"</text>

  <!-- Condition clause -->
  <rect x="80" y="375" width="310" height="130" rx="10" fill="#E8F4FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="235" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#4A90D9">CONDITION CLAUSE</text>
  <text x="235" y="420" text-anchor="middle" font-size="11" fill="#5D7A99">kdy + bych + L-participle</text>

  <!-- parts -->
  <rect x="100" y="435" width="80" height="30" rx="4" fill="#D6EAF8" stroke="#4A90D9" stroke-width="1"/>
  <text x="140" y="455" text-anchor="middle" font-size="14" fill="#2C3E50">Kdy-</text>
  <rect x="186" y="435" width="80" height="30" rx="4" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="226" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="#8E44AD">bych</text>
  <rect x="272" y="435" width="100" height="30" rx="4" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5"/>
  <text x="322" y="455" text-anchor="middle" font-size="14" fill="#E67E22" font-weight="600">mál čas</text>

  <text x="235" y="486" text-anchor="middle" font-size="11" fill="#7F8C8D" font-style="italic">Kdybych měl čas…</text>
  <text x="235" y="500" text-anchor="middle" font-size="10" fill="#95A5A6">If I had time…</text>

  <!-- arrow -->
  <path d="M 395 440 L 425 440" stroke="#2C3E50" stroke-width="2.5" marker-end="url(#arrow-dark)"/>
  <defs>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2C3E50"/>
    </marker>
  </defs>

  <!-- Result clause -->
  <rect x="430" y="375" width="290" height="130" rx="10" fill="#EAFAF1" stroke="#27AE60" stroke-width="2"/>
  <text x="575" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#27AE60">RESULT CLAUSE</text>
  <text x="575" y="420" text-anchor="middle" font-size="11" fill="#1E8449">L-participle + by + …</text>

  <rect x="445" y="435" width="100" height="30" rx="4" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5"/>
  <text x="495" y="455" text-anchor="middle" font-size="14" fill="#E67E22" font-weight="600">šel</text>
  <rect x="551" y="435" width="70" height="30" rx="4" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="586" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="#8E44AD">bych</text>
  <rect x="627" y="435" width="80" height="30" rx="4" fill="#D5F5E3" stroke="#27AE60" stroke-width="1"/>
  <text x="667" y="455" text-anchor="middle" font-size="14" fill="#2C3E50">do kina</text>

  <text x="575" y="486" text-anchor="middle" font-size="11" fill="#7F8C8D" font-style="italic">…šel bych do kina.</text>
  <text x="575" y="500" text-anchor="middle" font-size="10" fill="#95A5A6">…I would go to the cinema.</text>

  <!-- Full sentence -->
  <rect x="80" y="530" width="640" height="70" rx="8" fill="#F8F9FA" stroke="#ECEFF1" stroke-width="1"/>
  <text x="400" y="555" text-anchor="middle" font-size="15" fill="#2C3E50" font-weight="600">
    Kdybych měl čas, šel bych do kina.
  </text>
  <text x="400" y="578" text-anchor="middle" font-size="12" fill="#7F8C8D" font-style="italic">
    "If I had time, I would go to the cinema."
  </text>
</svg>