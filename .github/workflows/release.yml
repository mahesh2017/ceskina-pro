name: Release

# Builds distributable artifacts on a version tag (e.g. v1.0.0). Android is
# signed when the keystore secrets are present; iOS builds unsigned in CI
# (final signing/upload is done from Xcode or a Mac runner with credentials).
#
# Required repository secrets/vars for a signed Android build + backend config:
#   SUPABASE_URL, SUPABASE_ANON_KEY   — dart-defines baked into the build
#   ANDROID_KEYSTORE_BASE64           — base64 of the release .jks
#   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write backend config
        run: |
          mkdir -p env
          cat > env/prod.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}"
          }
          EOF

      - name: Restore release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=${{ github.workspace }}/android/release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release --dart-define-from-file=env/prod.json

      - uses: actions/upload-artifact@v4
        with:
          name: czechify-appbundle
          path: build/app/outputs/bundle/release/app-release.aab

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write backend config
        run: |
          mkdir -p env
          cat > env/prod.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}"
          }
          EOF

      - run: flutter pub get

      # Unsigned in CI — proves the release build compiles. Signed archive +
      # App Store upload is done from Xcode or a runner with signing certs.
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define-from-file=env/prod.json
