name: ceskina_pro
description: AI-powered Czech language learning app for CEFR A1/A2 proficiency.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^3.0.0
  go_router: ^14.0.0

  # Database & Storage
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Audio
  just_audio: ^0.9.39
  record: ^6.2.1

  # Speech (OS-native, fallback only)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.1.5

  # Backend / sync (offline-first)
  supabase_flutter: ^2.5.0
  uuid: ^4.0.0

  # Utilities
  collection: ^1.18.0
  path: ^1.9.0
  path_provider: ^2.1.0
  crypto: ^3.0.0
  logging: ^1.2.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation (Drift)
  build_runner: ^2.4.0
  drift_dev: ^2.20.0
  sqlite3: ^2.7.0

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/curriculum/
    - assets/curriculum/lessons/
    - assets/vocabulary/

  fonts:
    - family: Bricolage Grotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque.ttf
    - family: Schibsted Grotesk
      fonts:
        - asset: assets/fonts/SchibstedGrotesk.ttf
