name: ceskina_pro
description: AI-powered Czech language learning app for CEFR A1/A2 proficiency.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  go_router: ^14.0.0

  # Database & Storage
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Audio
  record: ^7.1.0
  just_audio: ^0.9.39
  audio_session: ^0.1.0

  # Speech (OS-native fallbacks)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0

  # Spaced Repetition
  # dart-fsrs or fsrs package — uncomment when available on pub.dev
  # fsrs: ^1.0.0

  # Networking
  dio: ^5.4.0

  # Utilities
  json_annotation: ^4.8.0
  freezed_annotation: ^3.0.0
  collection: ^1.18.0
  path: ^1.9.0
  path_provider: ^2.1.0
  crypto: ^3.0.0
  logging: ^1.2.0

  # Localization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.0
  riverpod_generator: ^3.0.0
  drift_dev: ^2.20.0
  json_serializable: ^6.7.0
  freezed: ^3.0.0

  # Testing
  mocktail: ^1.0.0

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/curriculum/
    - assets/curriculum/lessons/
    - assets/vocabulary/
    - assets/exams/
    - assets/audio/
    - assets/images/