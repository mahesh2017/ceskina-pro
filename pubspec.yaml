name: ceskina_pro
description: AI-powered Czech language learning app for CEFR A1/A2 proficiency.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Localization (gen-l10n) — foundation for translating the UI chrome.
  flutter_localizations:
    sdk: flutter
  intl: any

  # State Management & Routing
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.0

  # Database & Storage
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^10.0.0

  # Audio
  just_audio: ^0.10.0
  record: ^7.0.0

  # Speech (OS-native, fallback only)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Backend / sync (offline-first)
  supabase_flutter: ^2.5.0
  uuid: ^4.0.0

  # Utilities
  collection: ^1.18.0
  path: ^1.9.0
  path_provider: ^2.1.0
  crypto: ^3.0.0
  logging: ^1.2.0
  share_plus: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation (Drift)
  build_runner: ^2.4.0
  drift_dev: ^2.34.0
  sqlite3: ^3.0.0

  # Linting
  flutter_lints: ^6.0.0

  # App icon generation (dart run flutter_launcher_icons)
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: true
  adaptive_icon_background: "#1F6F6B"
  adaptive_icon_foreground: assets/images/app_icon_foreground.png
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: assets/images/app_icon.png
  windows:
    generate: true
    image_path: assets/images/app_icon.png

flutter:
  uses-material-design: true
  generate: true # gen-l10n from lib/l10n/*.arb

  assets:
    - assets/images/
    - assets/curriculum/
    - assets/curriculum/lessons/
    - assets/vocabulary/

  fonts:
    - family: Bricolage Grotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque.ttf
    - family: Schibsted Grotesk
      fonts:
        - asset: assets/fonts/SchibstedGrotesk.ttf
