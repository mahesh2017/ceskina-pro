<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
    </marker>
  </defs>

  <rect width="800" height="900" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#2C3E50">Prepositions → Cases</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#7F8C8D" font-style="italic">Předložky a pády — which preposition triggers which case</text>

  <!-- Central column of case "destination" cards on the right -->
  <!-- Right side: x=560, 5 case cards stacked. Heights 90 with 20 gap -->
  <!-- Total: 5*90 + 4*20 = 530, start y=180 -->

  <!-- Right-side case targets -->
  <!-- Genitive (2) - Purple -->
  <g transform="translate(540, 180)">
    <rect width="220" height="90" rx="12" fill="#8E44AD"/>
    <text x="14" y="28" font-size="12" font-weight="700" fill="#fff" opacity="0.85">2. PÁD</text>
    <text x="14" y="52" font-size="20" font-weight="700" fill="#fff">Genitive</text>
    <text x="14" y="72" font-size="11" fill="#fff" opacity="0.85" font-style="italic">"from / out of / without"</text>
    <text x="206" y="52" text-anchor="end" font-size="36" font-weight="700" fill="#fff" opacity="0.3">2</text>
  </g>

  <!-- Dative (3) - Green -->
  <g transform="translate(540, 290)">
    <rect width="220" height="90" rx="12" fill="#27AE60"/>
    <text x="14" y="28" font-size="12" font-weight="700" fill="#fff" opacity="0.85">3. PÁD</text>
    <text x="14" y="52" font-size="20" font-weight="700" fill="#fff">Dative</text>
    <text x="14" y="72" font-size="11" fill="#fff" opacity="0.85" font-style="italic">"towards / against"</text>
    <text x="206" y="52" text-anchor="end" font-size="36" font-weight="700" fill="#fff" opacity="0.3">3</text>
  </g>

  <!-- Accusative (4) - Red -->
  <g transform="translate(540, 400)">
    <rect width="220" height="90" rx="12" fill="#E74C3C"/>
    <text x="14" y="28" font-size="12" font-weight="700" fill="#fff" opacity="0.85">4. PÁD</text>
    <text x="14" y="52" font-size="20" font-weight="700" fill="#fff">Accusative</text>
    <text x="14" y="72" font-size="11" fill="#fff" opacity="0.85" font-style="italic">"for / through / onto"</text>
    <text x="206" y="52" text-anchor="end" font-size="36" font-weight="700" fill="#fff" opacity="0.3">4</text>
  </g>

  <!-- Locative (5) - Orange -->
  <g transform="translate(540, 510)">
    <rect width="220" height="90" rx="12" fill="#E67E22"/>
    <text x="14" y="28" font-size="12" font-weight="700" fill="#fff" opacity="0.85">5. PÁD</text>
    <text x="14" y="52" font-size="20" font-weight="700" fill="#fff">Locative</text>
    <text x="14" y="72" font-size="11" fill="#fff" opacity="0.85" font-style="italic">"in / on / about"</text>
    <text x="206" y="52" text-anchor="end" font-size="36" font-weight="700" fill="#fff" opacity="0.3">5</text>
  </g>

  <!-- Instrumental (6) - Teal -->
  <g transform="translate(540, 620)">
    <rect width="220" height="90" rx="12" fill="#16A085"/>
    <text x="14" y="28" font-size="12" font-weight="700" fill="#fff" opacity="0.85">6. PÁD</text>
    <text x="14" y="52" font-size="20" font-weight="700" fill="#fff">Instrumental</text>
    <text x="14" y="72" font-size="11" fill="#fff" opacity="0.85" font-style="italic">"with / under / behind"</text>
    <text x="206" y="52" text-anchor="end" font-size="36" font-weight="700" fill="#fff" opacity="0.3">6</text>
  </g>

  <!-- Left side: preposition pills grouped by case, with arrows to right cards -->
  <!-- Each group is a vertical stack of pills. Use y-centers matching right cards. -->

  <!-- Genitive prepositions (target center y=225) -->
  <g font-size="15" font-weight="700">
    <g transform="translate(40, 180)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#8E44AD" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#8E44AD">do</text>
    </g>
    <g transform="translate(130, 180)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#8E44AD" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#8E44AD">z / ze</text>
    </g>
    <g transform="translate(220, 180)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#8E44AD" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#8E44AD">od</text>
    </g>
    <g transform="translate(40, 222)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#8E44AD" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#8E44AD">u</text>
    </g>
    <g transform="translate(130, 222)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#8E44AD" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#8E44AD">bez</text>
    </g>
    <g transform="translate(220, 222)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#8E44AD" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#8E44AD">kromě</text>
    </g>
  </g>

  <!-- Dative prepositions (target center y=335) -->
  <g font-size="15" font-weight="700">
    <g transform="translate(80, 300)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#27AE60" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#27AE60">k / ke</text>
    </g>
    <g transform="translate(170, 300)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#27AE60" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#27AE60">proti</text>
    </g>
    <g transform="translate(125, 342)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#27AE60" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#27AE60">díky</text>
    </g>
    <g transform="translate(215, 342)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#27AE60" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#27AE60">vůči</text>
    </g>
  </g>

  <!-- Accusative prepositions (target center y=445) -->
  <g font-size="15" font-weight="700">
    <g transform="translate(80, 410)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E74C3C" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E74C3C">pro</text>
    </g>
    <g transform="translate(170, 410)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E74C3C" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E74C3C">přes</text>
    </g>
    <g transform="translate(125, 452)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E74C3C" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E74C3C">na ⊳</text>
    </g>
    <g transform="translate(215, 452)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E74C3C" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E74C3C">mimo</text>
    </g>
  </g>

  <!-- Locative prepositions (target center y=555) -->
  <g font-size="15" font-weight="700">
    <g transform="translate(40, 520)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E67E22" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E67E22">v / ve</text>
    </g>
    <g transform="translate(130, 520)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E67E22" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E67E22">na</text>
    </g>
    <g transform="translate(220, 520)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E67E22" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E67E22">o</text>
    </g>
    <g transform="translate(40, 562)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E67E22" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E67E22">po</text>
    </g>
    <g transform="translate(130, 562)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#E67E22" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#E67E22">při</text>
    </g>
  </g>

  <!-- Instrumental prepositions (target center y=665) -->
  <g font-size="15" font-weight="700">
    <g transform="translate(40, 615)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#16A085" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#16A085">s / se</text>
    </g>
    <g transform="translate(130, 615)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#16A085" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#16A085">pod</text>
    </g>
    <g transform="translate(220, 615)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#16A085" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#16A085">nad</text>
    </g>
    <g transform="translate(40, 657)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#16A085" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#16A085">před</text>
    </g>
    <g transform="translate(130, 657)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#16A085" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#16A085">za</text>
    </g>
    <g transform="translate(220, 657)">
      <rect width="80" height="32" rx="16" fill="#fff" stroke="#16A085" stroke-width="2"/>
      <text x="40" y="22" text-anchor="middle" fill="#16A085">mezi</text>
    </g>
  </g>

  <!-- Arrows from each group (right edge of pills) to corresponding case card (left edge) -->
  <g fill="none" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="310" y1="219" x2="535" y2="225" stroke="#8E44AD"/>
    <line x1="305" y1="342" x2="535" y2="335" stroke="#27AE60"/>
    <line x1="305" y1="452" x2="535" y2="445" stroke="#E74C3C"/>
    <line x1="310" y1="581" x2="535" y2="555" stroke="#E67E22"/>
    <line x1="310" y1="683" x2="535" y2="665" stroke="#16A085"/>
  </g>

  <!-- Nominative note (no prepositions) -->
  <g transform="translate(540, 730)">
    <rect width="220" height="56" rx="12" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="14" y="24" font-size="12" font-weight="700" fill="#7F8C8D">1. Nominative — no prep.</text>
    <text x="14" y="42" font-size="10" fill="#95A5A6" font-style="italic">Nominative has no governing preposition.</text>
  </g>

  <!-- na note -->
  <g transform="translate(40, 770)">
    <rect width="720" height="56" rx="10" fill="#FFF5E6" stroke="#E67E22" stroke-width="1.5"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#E67E22">⚠ "na" is dual-case</text>
    <text x="20" y="42" font-size="11" fill="#2C3E50">na stole (locative — "on the table", static)  ·  na stůl (accusative — "onto the table", direction)</text>
  </g>

  <!-- Footer -->
  <text x="400" y="870" text-anchor="middle" font-size="11" fill="#95A5A6">Some prepositions pair with multiple cases — motion = accusative, location = locative.</text>
</svg>